name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev + headless dependencies
        # setup-uv already provisions the Python + virtual environment.
        # headless (playwright) is included so `ty` can resolve the optional
        # scraper imports in fetch_rankings.py; browser binaries are NOT installed
        # (`playwright install` is unnecessary for type-checking and the tests).
        run: uv pip install -e ".[dev,headless]"

      - name: Lint (ruff)
        run: uv run ruff check src/ scripts/ tests/

      - name: Format check (ruff format)
        run: uv run ruff format --check src/ scripts/ tests/

      - name: Type check (ty)
        run: uv run ty check src/

      - name: Test (pytest)
        run: uv run pytest
