# Pre-commit hooks mirroring the CI gate (.github/workflows/ci.yml).
# Local hooks run the tools via `uv run`, so they use the exact ruff/ty versions
# pinned in pyproject.toml's [dev] extra — one source of truth, no drift vs CI.
#
# One-time setup:  uv pip install -e ".[dev]" && uv run pre-commit install
# Run manually:    uv run pre-commit run --all-files
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (lint, autofix)
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ty
        name: ty check (types, src/)
        entry: uv run ty check src/
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true
